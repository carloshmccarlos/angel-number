<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background Gradient: Rich cream to soft gold paper -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#FDFBF7" />
      <stop offset="100%" stop-color="#F6F1E5" />
    </radialGradient>
    <!-- Metallic Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#AA7C11" />
      <stop offset="30%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#FDF0CD" />
      <stop offset="70%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#8A640F" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" rx="22" fill="url(#bgGrad)" />
  
  <!-- Double thin concentric gold circles representing aligned vibration -->
  <circle cx="50%" cy="50%" r="42" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.4" />
  <circle cx="50%" cy="50%" r="38" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" />
  
  <!-- Sacred Geometry representation of Angel Wings & Star -->
  <g transform="translate(50, 52)">
    <!-- Wings path: elegant mirrored curves -->
    <path d="M 0,-5 
             C -8,-25 -25,-25 -32,-10 
             C -38,5 -25,20 0,5 
             C 25,20 38,5 32,-10 
             C 25,-25 8,-25 0,-5 Z" 
          fill="url(#goldGrad)" 
          opacity="0.9" />
    <!-- Center glowing diamond core -->
    <polygon points="0,-12 4,-5 0,2 -4,-5" fill="#FDFBF7" />
  </g>
  
  <!-- Spark of divine guidance (8-point star) -->
  <g transform="translate(50, 28)">
    <path d="M 0,-8 Q 0,0 -8,0 Q 0,0 0,8 Q 0,0 8,0 Q 0,0 0,-8" fill="url(#goldGrad)" />
  </g>
</svg>
